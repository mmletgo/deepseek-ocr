<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DeepSeek-OCR Web</title>
    <link rel="stylesheet" href="/static/style.css">
</head>
<body>
    <div class="container">
        <!-- 页面头部 -->
        <header>
            <h1>DeepSeek-OCR</h1>
            <p>Upload a scanned PDF to convert it into searchable PDF and Markdown</p>
        </header>

        <!-- 主卡片区域 -->
        <main class="card">
            <!-- 拖拽上传区域 -->
            <section id="uploadZone" class="upload-zone" role="button" aria-label="Upload PDF file">
                <span class="upload-icon" aria-hidden="true">&#128196;</span>
                <h3>Drag and drop your PDF here</h3>
                <p>or click to select a file</p>
                <button type="button" class="upload-btn" id="uploadBtn">Select PDF File</button>
                <input type="file" class="file-input" id="fileInput" accept=".pdf,application/pdf" multiple>
            </section>

            <!-- 任务列表 -->
            <div id="taskList" class="task-list"></div>

            <!-- 清除已完成按钮 -->
            <button type="button" id="clearDoneBtn" class="clear-btn" style="display:none">Clear Completed</button>
        </main>

        <!-- 页脚 -->
        <footer>
            <p>DeepSeek-OCR v0.1.0</p>
            <div class="health-indicator">
                <span class="health-dot" id="healthDot"></span>
                <span id="healthText">Checking service status...</span>
            </div>
        </footer>
    </div>

    <script src="/static/app.js"></script>
</body>
</html>
