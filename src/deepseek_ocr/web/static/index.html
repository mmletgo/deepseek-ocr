<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DeepSeek-OCR Web</title>
    <link rel="stylesheet" href="/static/style.css">
</head>
<body>
    <div class="container">
        <!-- 页面头部 -->
        <header>
            <h1>DeepSeek-OCR</h1>
            <p>Upload a scanned PDF to convert it into searchable PDF and Markdown</p>
        </header>

        <!-- 主卡片区域 -->
        <main class="card">
            <!-- 拖拽上传区域 -->
            <section id="uploadZone" class="upload-zone" role="button" aria-label="Upload PDF file">
                <span class="upload-icon" aria-hidden="true">&#128196;</span>
                <h3>Drag and drop your PDF here</h3>
                <p>or click to select a file</p>
                <div class="mode-selector" id="modeSelector">
                    <label class="mode-option">
                        <input type="radio" name="pdfMode" value="dual_layer" checked>
                        <span class="mode-label">
                            <span class="mode-title">Dual Layer</span>
                            <span class="mode-desc">Invisible text, original scan look</span>
                        </span>
                    </label>
                    <label class="mode-option">
                        <input type="radio" name="pdfMode" value="rewrite">
                        <span class="mode-label">
                            <span class="mode-title">Rewrite</span>
                            <span class="mode-desc">Vector font, clearer text</span>
                        </span>
                    </label>
                </div>
                <button type="button" class="upload-btn" id="uploadBtn">Select PDF File</button>
                <input type="file" class="file-input" id="fileInput" accept=".pdf,application/pdf">
            </section>

            <!-- 已选文件信息 -->
            <div id="fileInfo" class="file-info">
                <span class="file-info-icon" aria-hidden="true">&#128196;</span>
                <div class="file-info-details">
                    <div class="file-info-name" id="fileInfoName"></div>
                    <div class="file-info-size" id="fileInfoSize"></div>
                </div>
            </div>

            <!-- 进度区域 -->
            <section id="progressSection" class="progress-section" aria-label="Conversion progress">
                <div class="progress-header">
                    <span class="progress-label">Converting...</span>
                    <span class="progress-percent" id="progressPercent">0%</span>
                </div>
                <div class="progress-bar-container">
                    <div class="progress-bar" id="progressBar" role="progressbar" aria-valuenow="0" aria-valuemin="0" aria-valuemax="100"></div>
                </div>
                <div class="progress-status" id="progressStatus"></div>
            </section>

            <!-- 转换结果区域 -->
            <section id="resultSection" class="result-section" aria-label="Conversion results">
                <div class="result-header">
                    <span class="result-header-icon" aria-hidden="true">&#10004;</span>
                    <h3>Conversion Complete</h3>
                </div>
                <div class="download-buttons">
                    <a id="downloadPdfBtn" class="download-btn" href="#" download>
                        <span class="download-btn-icon" aria-hidden="true">&#128196;</span>
                        Download PDF
                    </a>
                    <a id="downloadMdBtn" class="download-btn" href="#" download>
                        <span class="download-btn-icon" aria-hidden="true">&#128221;</span>
                        Download Markdown
                    </a>
                </div>
            </section>

            <!-- 错误提示区域 -->
            <section id="errorSection" class="error-section" aria-label="Error message">
                <div class="error-message">
                    <span class="error-icon" aria-hidden="true">&#9888;</span>
                    <span class="error-text" id="errorText"></span>
                </div>
            </section>

            <!-- 重新上传按钮 -->
            <button type="button" class="reset-btn" id="resetBtn">Upload Another File</button>
        </main>

        <!-- 页脚 -->
        <footer>
            <p>DeepSeek-OCR v0.1.0</p>
            <div class="health-indicator">
                <span class="health-dot" id="healthDot"></span>
                <span id="healthText">Checking service status...</span>
            </div>
        </footer>
    </div>

    <script src="/static/app.js"></script>
</body>
</html>
